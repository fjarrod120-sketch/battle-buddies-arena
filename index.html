<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Battle Buddies Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; touch-action: none; }
    body { display: flex; align-items: center; justify-content: center; }
    canvas { display: block; }
    #ad-container { display: none; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a1a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 99999;
      font-family: Arial Black, Arial, sans-serif;
    }
    #loading-screen h1 { color: #ffdd00; font-size: 28px; margin-bottom: 10px; }
    #loading-screen p { color: #00d4ff; font-size: 14px; }
    #loading-screen .bar {
      width: 200px; height: 6px; background: #1a1a3e; border-radius: 3px;
      margin-top: 20px; overflow: hidden;
    }
    #loading-screen .bar-fill {
      height: 100%; width: 0%; background: #ff6b35; border-radius: 3px;
      animation: load 2s ease-in-out forwards;
    }
    @keyframes load { to { width: 100%; } }
  </style>
  <script type="module" crossorigin src="./assets/index-DRl0LiqA.js"></script>

  <div id="loading-screen">

    <div class="bar"><div class="bar-fill"></div></div>

  <div id="game-container"></div>
